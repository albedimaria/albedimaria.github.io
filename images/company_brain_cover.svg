<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f5f5f0"/>

  <!-- ====== LEFT PANEL — Ask interface mockup ====== -->
  <!-- Browser window -->
  <rect x="40" y="50" width="680" height="540" rx="12" fill="white" stroke="#e0e0d8" stroke-width="1.5"/>
  <!-- Browser chrome bar -->
  <rect x="40" y="50" width="680" height="38" rx="12" fill="#e8e8e2"/>
  <rect x="40" y="72" width="680" height="16" fill="#e8e8e2"/>
  <!-- Browser dots -->
  <circle cx="70" cy="69" r="6" fill="#ff5f57"/>
  <circle cx="90" cy="69" r="6" fill="#febc2e"/>
  <circle cx="110" cy="69" r="6" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="135" y="59" width="420" height="20" rx="10" fill="white" opacity="0.7"/>
  <text x="345" y="73" fill="#888" font-size="10" text-anchor="middle" font-family="monospace">company-brain-alberto.onrender.com</text>

  <!-- App header -->
  <rect x="40" y="88" width="680" height="52" fill="white"/>
  <text x="76" y="120" fill="#b06a2c" font-size="19" font-weight="700" letter-spacing="-0.3">Company Brain</text>
  <text x="76" y="134" fill="#111811" font-size="9" opacity="0.5">Al Dente S.r.l. · CRM · ERP · Calls · KB</text>
  <!-- lang + graph chips -->
  <rect x="566" y="104" width="60" height="22" rx="6" fill="none" stroke="#b06a2c" stroke-width="1.1" opacity="0.8"/>
  <text x="596" y="119" fill="#b06a2c" font-size="9" text-anchor="middle">IT · EN · ES</text>
  <rect x="636" y="104" width="48" height="22" rx="6" fill="#b06a2c" opacity="0.12"/>
  <text x="660" y="119" fill="#b06a2c" font-size="9" text-anchor="middle" font-weight="600">Graph</text>

  <!-- Ask input -->
  <rect x="64" y="156" width="632" height="44" rx="12" fill="#faf8f3" stroke="#e0d8c8" stroke-width="1.2"/>
  <text x="84" y="182" fill="#111811" font-size="11.5" opacity="0.75">Quante opportunità aperte ha Primato Supermercati (CUST-0132)?</text>
  <rect x="648" y="164" width="36" height="28" rx="8" fill="#b06a2c"/>
  <text x="666" y="183" fill="white" font-size="14" text-anchor="middle" font-weight="700">↑</text>

  <!-- Answer card -->
  <rect x="64" y="216" width="632" height="190" rx="12" fill="white" stroke="#ece6da" stroke-width="1.2"/>
  <text x="84" y="240" fill="#b06a2c" font-size="9" font-weight="700" letter-spacing="1.5">RISPOSTA</text>
  <!-- verticale tag -->
  <rect x="620" y="228" width="60" height="18" rx="9" fill="#1e5922" opacity="0.12"/>
  <text x="650" y="240" fill="#1e5922" font-size="9" text-anchor="middle" font-weight="600">CRM</text>

  <text x="84" y="274" fill="#111811" font-size="23" font-weight="700" letter-spacing="-0.5">4 opportunità aperte · 740.000 €</text>
  <text x="84" y="298" fill="#111811" font-size="11" opacity="0.62">446.000 € in negoziazione (2) · 294.000 € in qualificazione (2) · canale GDO</text>

  <!-- divider -->
  <line x1="84" y1="318" x2="676" y2="318" stroke="#ece6da" stroke-width="1"/>

  <!-- sources -->
  <text x="84" y="340" fill="#111811" font-size="9" font-weight="700" letter-spacing="1" opacity="0.45">FONTI</text>
  <rect x="124" y="328" width="118" height="18" rx="9" fill="#f0ece2"/>
  <text x="183" y="340" fill="#6b6453" font-size="9" text-anchor="middle" font-family="monospace">crm/opportunities</text>
  <rect x="250" y="328" width="66" height="18" rx="9" fill="#f0ece2"/>
  <text x="283" y="340" fill="#6b6453" font-size="9" text-anchor="middle" font-family="monospace">CUST-0132</text>
  <rect x="324" y="328" width="62" height="18" rx="9" fill="#f0ece2"/>
  <text x="355" y="340" fill="#6b6453" font-size="9" text-anchor="middle" font-family="monospace">OPP-2021</text>
  <rect x="394" y="328" width="62" height="18" rx="9" fill="#f0ece2"/>
  <text x="425" y="340" fill="#6b6453" font-size="9" text-anchor="middle" font-family="monospace">OPP-2075</text>

  <!-- grounded badge -->
  <rect x="84" y="366" width="592" height="26" rx="8" fill="#1e5922" opacity="0.08"/>
  <circle cx="102" cy="379" r="7" fill="#1e5922"/>
  <text x="102" y="383" fill="white" font-size="9" text-anchor="middle" font-weight="700">✓</text>
  <text x="118" y="383" fill="#1e5922" font-size="10.5" font-weight="600">Grounded — ogni numero viene dai tool, calcolato in Python. Zero allucinazioni.</text>

  <!-- "Come risponde" 3 steps -->
  <text x="380" y="438" fill="#b06a2c" font-size="13" font-weight="700" text-anchor="middle">Come risponde</text>

  <circle cx="160" cy="486" r="23" fill="#b06a2c" opacity="0.12"/>
  <text x="160" y="492" fill="#b06a2c" font-size="17" text-anchor="middle">🛠</text>
  <text x="160" y="520" fill="#111811" font-size="10.5" text-anchor="middle" font-weight="600">1. Sceglie i tool</text>
  <text x="160" y="535" fill="#111811" font-size="9" text-anchor="middle" opacity="0.6">CRM · ERP · Calls · KB</text>

  <circle cx="380" cy="486" r="23" fill="#b06a2c" opacity="0.12"/>
  <text x="380" y="492" fill="#b06a2c" font-size="17" text-anchor="middle">🧮</text>
  <text x="380" y="520" fill="#111811" font-size="10.5" text-anchor="middle" font-weight="600">2. Python fa i conti</text>
  <text x="380" y="535" fill="#111811" font-size="9" text-anchor="middle" opacity="0.6">somme e totali esatti</text>

  <circle cx="600" cy="486" r="23" fill="#1e5922" opacity="0.14"/>
  <text x="600" y="492" fill="#1e5922" font-size="17" text-anchor="middle">📎</text>
  <text x="600" y="520" fill="#111811" font-size="10.5" text-anchor="middle" font-weight="600">3. Risponde con fonti</text>
  <text x="600" y="535" fill="#111811" font-size="9" text-anchor="middle" opacity="0.6">provenienza + verticale</text>

  <!-- ====== RIGHT PANEL — Knowledge graph mockup ====== -->
  <rect x="760" y="50" width="400" height="540" rx="12" fill="#14110d"/>

  <!-- header -->
  <rect x="760" y="50" width="400" height="56" rx="12" fill="#211a12"/>
  <rect x="760" y="80" width="400" height="26" fill="#211a12"/>
  <text x="790" y="84" fill="#f5efe2" font-size="14" font-weight="700">Knowledge Graph</text>
  <text x="790" y="100" fill="#f5efe2" font-size="9.5" opacity="0.5">clienti → prodotti → materiali → fornitori</text>
  <circle cx="1128" cy="78" r="5" fill="#22c55e"/>

  <!-- ===== edges ===== -->
  <g stroke="#6b5638" stroke-width="1.4" opacity="0.55">
    <line x1="900" y1="185" x2="985" y2="250"/>
    <line x1="900" y1="185" x2="865" y2="265"/>
    <line x1="820" y1="162" x2="865" y2="265"/>
    <line x1="1068" y1="162" x2="1060" y2="238"/>
    <line x1="985" y1="250" x2="945" y2="335"/>
    <line x1="1060" y1="238" x2="1050" y2="312"/>
    <line x1="865" y1="265" x2="858" y2="346"/>
    <line x1="945" y1="335" x2="960" y2="410"/>
    <line x1="858" y1="346" x2="882" y2="420"/>
    <line x1="1050" y1="312" x2="1075" y2="390"/>
    <line x1="945" y1="335" x2="1075" y2="390"/>
    <line x1="900" y1="185" x2="1060" y2="238"/>
  </g>

  <!-- ===== nodes ===== -->
  <!-- customers (amber) -->
  <circle cx="900" cy="185" r="11" fill="#d99a4e"/>
  <circle cx="820" cy="162" r="7" fill="#d99a4e" opacity="0.85"/>
  <circle cx="1068" cy="162" r="7" fill="#d99a4e" opacity="0.85"/>
  <!-- products (cream) -->
  <circle cx="985" cy="250" r="9" fill="#ecc987"/>
  <circle cx="865" cy="265" r="8" fill="#ecc987" opacity="0.9"/>
  <circle cx="1060" cy="238" r="7" fill="#ecc987" opacity="0.85"/>
  <!-- materials (green) -->
  <circle cx="945" cy="335" r="8" fill="#7cbf5a"/>
  <circle cx="858" cy="346" r="6.5" fill="#7cbf5a" opacity="0.85"/>
  <circle cx="1050" cy="312" r="6.5" fill="#7cbf5a" opacity="0.85"/>
  <!-- suppliers (teal) -->
  <circle cx="960" cy="410" r="8" fill="#4fb0bf"/>
  <circle cx="882" cy="420" r="6.5" fill="#4fb0bf" opacity="0.85"/>
  <circle cx="1075" cy="390" r="6.5" fill="#4fb0bf" opacity="0.85"/>

  <!-- node labels -->
  <text x="916" y="182" fill="#f5efe2" font-size="10" font-weight="600">Primato</text>
  <text x="998" y="253" fill="#f0e6d2" font-size="9" font-family="monospace" opacity="0.85">PAS-SPA-500</text>
  <text x="900" y="332" fill="#f0e6d2" font-size="9" font-family="monospace" opacity="0.85" text-anchor="end">RAW-SEM-003</text>
  <text x="974" y="414" fill="#f0e6d2" font-size="9" opacity="0.85">Molino S.G.</text>

  <!-- legend -->
  <line x1="784" y1="452" x2="1136" y2="452" stroke="#f5efe2" stroke-width="0.5" opacity="0.15"/>
  <circle cx="792" cy="474" r="5" fill="#d99a4e"/>
  <text x="802" y="478" fill="#f5efe2" font-size="9" opacity="0.7">Clienti</text>
  <circle cx="872" cy="474" r="5" fill="#ecc987"/>
  <text x="882" y="478" fill="#f5efe2" font-size="9" opacity="0.7">Prodotti</text>
  <circle cx="958" cy="474" r="5" fill="#7cbf5a"/>
  <text x="968" y="478" fill="#f5efe2" font-size="9" opacity="0.7">Materiali</text>
  <circle cx="1052" cy="474" r="5" fill="#4fb0bf"/>
  <text x="1062" y="478" fill="#f5efe2" font-size="9" opacity="0.7">Fornitori</text>

  <!-- bottom strip - stack -->
  <rect x="760" y="534" width="400" height="56" fill="#0e0b07"/>
  <rect x="760" y="534" width="400" height="20" fill="#0e0b07"/>
  <text x="784" y="566" fill="#f5efe2" font-size="9" opacity="0.5">Stack:</text>
  <rect x="826" y="554" width="50" height="18" rx="9" fill="#b06a2c" opacity="0.75"/>
  <text x="851" y="566" fill="#f5efe2" font-size="9" text-anchor="middle">Python</text>
  <text x="882" y="566" fill="#f5efe2" font-size="10" opacity="0.4">·</text>
  <rect x="894" y="554" width="58" height="18" rx="9" fill="#b06a2c" opacity="0.75"/>
  <text x="923" y="566" fill="#f5efe2" font-size="9" text-anchor="middle">FastAPI</text>
  <text x="958" y="566" fill="#f5efe2" font-size="10" opacity="0.4">·</text>
  <rect x="970" y="554" width="44" height="18" rx="9" fill="#b06a2c" opacity="0.75"/>
  <text x="992" y="566" fill="#f5efe2" font-size="9" text-anchor="middle">BM25</text>
  <text x="1020" y="566" fill="#f5efe2" font-size="10" opacity="0.4">·</text>
  <rect x="1032" y="554" width="50" height="18" rx="9" fill="#b06a2c" opacity="0.75"/>
  <text x="1057" y="566" fill="#f5efe2" font-size="9" text-anchor="middle">Render</text>

  <!-- Divider between panels -->
  <line x1="740" y1="50" x2="740" y2="590" stroke="#d0d0c8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Top labels -->
  <text x="380" y="30" fill="#b06a2c" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1" opacity="0.65">ASK · GROUNDED ANSWERS</text>
  <text x="960" y="30" fill="#8a7a5a" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1" opacity="0.8">KNOWLEDGE GRAPH</text>
</svg>
