  <rect x="864" y="272" width="22" height="48" rx="2" fill="#1e5922" opacity="0.8"/>
  <rect x="896" y="290" width="22" height="30" rx="2" fill="#1e5922" opacity="0.7"/>
  <rect x="928" y="260" width="22" height="60" rx="2" fill="#1e5922"/>
  <rect x="960" y="275" width="22" height="45" rx="2" fill="#1e5922" opacity="0.85"/>
  <rect x="992" y="268" width="22" height="52" rx="2" fill="#1e5922"/>
  <rect x="1024" y="248" width="22" height="72" rx="2" fill="#f5a623"/>
  <rect x="1056" y="265" width="22" height="55" rx="2" fill="#1e5922" opacity="0.9"/>
  <rect x="1088" y="255" width="22" height="65" rx="2" fill="#1e5922"/>

