  <text x="380" y="30" fill="#1e5922" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1" opacity="0.6">LANDING PAGE</text>
  <text x="960" y="30" fill="#f5f5f0" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1" opacity="0.6">ADMIN DASHBOARD</text>
