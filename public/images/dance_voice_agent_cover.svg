  <rect x="40" y="398" width="680" height="192" fill="white"/>
  <text x="380" y="428" fill="#1e5922" font-size="16" font-weight="700" text-anchor="middle">Come funziona</text>

  <!-- Step 1 -->
  <circle cx="160" cy="475" r="24" fill="#f5a623" opacity="0.15"/>
  <text x="160" y="480" fill="#f5a623" font-size="18" text-anchor="middle">📞</text>
  <text x="160" y="508" fill="#111811" font-size="11" text-anchor="middle" font-weight="600">1. Chiama</text>
  <text x="160" y="523" fill="#111811" font-size="9" text-anchor="middle" opacity="0.6">24 ore su 24</text>

  <!-- Step 2 -->
  <circle cx="380" cy="475" r="24" fill="#f5a623" opacity="0.15"/>
  <text x="380" y="480" fill="#f5a623" font-size="18" text-anchor="middle">💬</text>
  <text x="380" y="508" fill="#111811" font-size="11" text-anchor="middle" font-weight="600">2. Parla con Tropicoqueta</text>
  <text x="380" y="523" fill="#111811" font-size="9" text-anchor="middle" opacity="0.6">In italiano o spagnolo</text>

