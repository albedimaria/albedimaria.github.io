  <circle cx="600" cy="475" r="24" fill="#f5a623" opacity="0.15"/>
  <text x="600" y="480" fill="#f5a623" font-size="18" text-anchor="middle">📅</text>
  <text x="600" y="508" fill="#111811" font-size="11" text-anchor="middle" font-weight="600">3. Prenoti subito</text>
  <text x="600" y="523" fill="#111811" font-size="9" text-anchor="middle" opacity="0.6">Senza app né attese</text>

