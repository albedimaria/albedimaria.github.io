  <text x="875" y="334" fill="#f5f5f0" font-size="8" text-anchor="middle" opacity="0.4">M</text>
  <text x="907" y="334" fill="#f5f5f0" font-size="8" text-anchor="middle" opacity="0.4">G</text>
  <text x="939" y="334" fill="#f5f5f0" font-size="8" text-anchor="middle" opacity="0.4">V</text>
  <text x="971" y="334" fill="#f5f5f0" font-size="8" text-anchor="middle" opacity="0.4">S</text>
  <text x="1003" y="334" fill="#f5f5f0" font-size="8" text-anchor="middle" opacity="0.4">D</text>
  <text x="1035" y="334" fill="#f5a623" font-size="8" text-anchor="middle">L</text>
  <text x="1067" y="334" fill="#f5f5f0" font-size="8" text-anchor="middle" opacity="0.4">M</text>
  <text x="1099" y="334" fill="#f5f5f0" font-size="8" text-anchor="middle" opacity="0.4">M</text>

