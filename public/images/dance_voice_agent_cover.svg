<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f5f5f0"/>

  <!-- ====== LEFT PANEL — Landing page mockup ====== -->
  <!-- Browser window -->
  <rect x="40" y="50" width="680" height="540" rx="12" fill="white" stroke="#e0e0d8" stroke-width="1.5"/>
  <!-- Browser chrome bar -->
  <rect x="40" y="50" width="680" height="38" rx="12" fill="#e8e8e2"/>
  <rect x="40" y="72" width="680" height="16" fill="#e8e8e2"/>
  <!-- Browser dots -->
  <circle cx="70" cy="69" r="6" fill="#ff5f57"/>
  <circle cx="90" cy="69" r="6" fill="#febc2e"/>
  <circle cx="110" cy="69" r="6" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="135" y="59" width="420" height="20" rx="10" fill="white" opacity="0.7"/>
  <text x="345" y="73" fill="#888" font-size="10" text-anchor="middle" font-family="monospace">dance-voice-agent-dashboard.vercel.app</text>

  <!-- Landing page content -->
  <!-- Header -->
  <rect x="40" y="88" width="680" height="50" fill="#f5f5f0"/>
  <text x="76" y="119" fill="#1e5922" font-size="18" font-weight="700" letter-spacing="-0.3">Ritmo Tropicale</text>
  <rect x="656" y="103" width="48" height="22" rx="5" fill="none" stroke="#1e5922" stroke-width="1.2"/>
  <text x="680" y="118" fill="#1e5922" font-size="9" text-anchor="middle">Area Admin</text>

  <!-- Hero section -->
  <rect x="40" y="138" width="680" height="260" fill="#f5f5f0"/>

  <!-- Badge pill -->
