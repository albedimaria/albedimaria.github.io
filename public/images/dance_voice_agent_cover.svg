  <!-- Deepgram badge -->
  <rect x="826" y="537" width="58" height="18" rx="9" fill="#1e5922" opacity="0.7"/>
  <text x="855" y="549" fill="#f5f5f0" font-size="9" text-anchor="middle">Deepgram</text>
  <text x="892" y="549" fill="#f5f5f0" font-size="10" opacity="0.4">→</text>
  <!-- GPT-4o badge -->
  <rect x="904" y="537" width="48" height="18" rx="9" fill="#1e5922" opacity="0.7"/>
  <text x="928" y="549" fill="#f5f5f0" font-size="9" text-anchor="middle">GPT-4o</text>
  <text x="958" y="549" fill="#f5f5f0" font-size="10" opacity="0.4">→</text>
  <!-- ElevenLabs badge -->
  <rect x="968" y="537" width="66" height="18" rx="9" fill="#1e5922" opacity="0.7"/>
  <text x="1001" y="549" fill="#f5f5f0" font-size="9" text-anchor="middle">ElevenLabs</text>

