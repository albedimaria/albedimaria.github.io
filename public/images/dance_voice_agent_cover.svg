  <text x="836" y="170" fill="#f5f5f0" font-size="22" font-weight="700" text-anchor="middle">47</text>
  <text x="836" y="184" fill="#22c55e" font-size="9" text-anchor="middle">↑ 12%</text>

  <!-- Card 2 -->
  <rect x="904" y="122" width="112" height="70" rx="8" fill="#1e2e1e"/>
