  <text x="960" y="435" fill="#f5f5f0" font-size="10" text-anchor="middle">Bachata Int.</text>
  <rect x="1085" y="424" width="50" height="16" rx="8" fill="#1e5922"/>
  <text x="1110" y="436" fill="#f5f5f0" font-size="9" text-anchor="middle">confirmed</text>

  <!-- Row 3 -->
  <text x="800" y="455" fill="#f5f5f0" font-size="10">Laura B.</text>
  <text x="960" y="455" fill="#f5f5f0" font-size="10" text-anchor="middle">Kizomba</text>
  <rect x="1085" y="444" width="50" height="16" rx="8" fill="#f5a623" opacity="0.8"/>
  <text x="1110" y="456" fill="#111811" font-size="9" text-anchor="middle">pending</text>

  <!-- Row 4 -->
  <text x="800" y="475" fill="#f5f5f0" font-size="10">Sofia T.</text>
  <text x="960" y="475" fill="#f5f5f0" font-size="10" text-anchor="middle">Salsa Avanzato</text>
  <rect x="1085" y="464" width="50" height="16" rx="8" fill="#1e5922"/>
  <text x="1110" y="476" fill="#f5f5f0" font-size="9" text-anchor="middle">confirmed</text>

  <!-- Bottom strip - pipeline info -->
  <rect x="760" y="530" width="400" height="60" rx="0" fill="#0e1e0e"/>
  <rect x="760" y="560" width="400" height="30" rx="0" fill="#0e1e0e"/>
  <rect x="760" y="554" width="400" height="36" rx="0" fill="#0e1e0e"/>

  <!-- Round bottom corners for dark panel -->
  <rect x="760" y="558" width="400" height="32" fill="#0e1e0e"/>
  <rect x="760" y="570" width="400" height="20" rx="12" fill="#0e1e0e"/>

  <!-- Pipeline badges -->
