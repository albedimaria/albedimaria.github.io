  <text x="360" y="170" fill="#1e5922" font-size="10" text-anchor="middle" font-weight="600">Scuola di ballo latino · Milano</text>

  <!-- Hero headline -->
  <text x="380" y="218" fill="#111811" font-size="30" font-weight="700" text-anchor="middle" letter-spacing="-0.8">Il tuo assistente vocale 24/7</text>

  <!-- Subtitle -->
  <text x="380" y="246" fill="#111811" font-size="12" text-anchor="middle" opacity="0.6">Da Ritmo Tropicale prenoti lezioni di salsa, bachata e kizomba</text>
  <text x="380" y="262" fill="#111811" font-size="12" text-anchor="middle" opacity="0.6">semplicemente telefonando. Nessuna app, nessuna attesa.</text>

  <!-- CTA label -->
  <text x="380" y="291" fill="#111811" font-size="9" text-anchor="middle" opacity="0.4" letter-spacing="1.5">CHIAMA ORA</text>

