  <text x="302" y="331" fill="white" font-size="20" font-weight="700">📞 +1 662 705 6720</text>

  <!-- Disclaimer -->
  <text x="380" y="368" fill="#111811" font-size="9" text-anchor="middle" opacity="0.35">* numero demo — il numero italiano definitivo sarà attivo al lancio</text>

