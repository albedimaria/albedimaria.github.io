  <text x="960" y="395" fill="#f5f5f0" font-size="9" opacity="0.5" text-anchor="middle">CORSO</text>
  <text x="1120" y="395" fill="#f5f5f0" font-size="9" opacity="0.5" text-anchor="end">STATO</text>

